name: Python check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile source
        run: |
          python -m py_compile src/nwps_multigage_model.py
          python -m py_compile src/crest_eventset_train.py
          python -m py_compile src/filter_sites.py
          python -m py_compile src/model_status.py
          python -m py_compile src/train_model_profiles.py
          python -m py_compile src/forecast_profiles.py
          python -m py_compile src/build_standalone_dashboard.py

      - name: Show CLI help
        run: |
          python src/nwps_multigage_model.py --help
          python src/crest_eventset_train.py --help
          python src/filter_sites.py --help
          python src/model_status.py --help
          python src/train_model_profiles.py --help
          python src/forecast_profiles.py --help
          python src/build_standalone_dashboard.py --help
