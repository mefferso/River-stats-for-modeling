name: Run river model

on:
  workflow_dispatch:
    inputs:
      mode:
        description: What to run
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - discover
          - thresholds
          - download
          - train
          - run-all
          - profile-run
          - profile-train
          - profile-forecast
          - forecast-only
          - status
      years:
        description: Years of USGS data for download/train/run-all
        required: true
        default: '15'
      limit:
        description: Only first N sites; 0 means all sites
        required: true
        default: '1'
      selected_lids:
        description: Optional comma-separated LIDs, e.g. DARL1,MAGL1,OLVL1
        required: false
        default: ''
      event_set:
        description: Event set to train
        required: true
        default: flood
        type: choice
        options:
          - flood
          - moderate
          - major
          - all
          - custom
      min_crest_stage:
        description: Optional explicit minimum crest stage; blank uses event_set threshold columns
        required: false
        default: ''
      force_download:
        description: Re-download even if raw CSV exists in the runner
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run selected mode
        env:
          MODE: ${{ inputs.mode }}
          YEARS: ${{ inputs.years }}
          LIMIT: ${{ inputs.limit }}
          SELECTED_LIDS: ${{ inputs.selected_lids }}
          EVENT_SET: ${{ inputs.event_set }}
          MIN_CREST_STAGE: ${{ inputs.min_crest_stage }}
          FORCE_DOWNLOAD: ${{ inputs.force_download }}
        run: |
          python - <<'PY'
          import os
          import subprocess

          mode = os.environ['MODE']
          years = int(os.environ['YEARS'])
          limit = int(os.environ['LIMIT'])
          selected_lids = os.environ.get('SELECTED_LIDS', '').strip()
          event_set = os.environ['EVENT_SET']
          min_crest_stage = os.environ.get('MIN_CREST_STAGE', '').strip()
          force = os.environ['FORCE_DOWNLOAD'].lower() == 'true'

          if years < 1 or years > 30:
              raise SystemExit('years must be between 1 and 30')
          if limit < 0 or limit > 100:
              raise SystemExit('limit must be between 0 and 100')

          def run(cmd):
              print('RUN:', ' '.join(str(x) for x in cmd), flush=True)
              subprocess.run([str(x) for x in cmd], check=True)

          force_arg = ['--force'] if force else ['--skip-existing']
          crest_arg = ['--min-crest-stage', min_crest_stage] if min_crest_stage else []

          discovered = 'config/sites_with_usgs.csv'
          active_sites = 'config/sites_active.csv' if selected_lids or limit else discovered

          discover = ['python', 'src/nwps_multigage_model.py', 'discover-sites', '--sites', 'config/sites.csv', '--output', discovered]
          thresholds = ['python', 'src/crest_eventset_train.py', 'discover-thresholds', '--sites', discovered, '--output', discovered]
          make_active = ['python', 'src/filter_sites.py', '--sites', discovered, '--lids', selected_lids, '--limit', limit, '--output', active_sites]
          download = ['python', 'src/nwps_multigage_model.py', 'download', '--sites', active_sites, '--years', years] + force_arg
          train = ['python', 'src/crest_eventset_train.py', 'train', '--sites', active_sites, '--event-set', event_set] + crest_arg
          profile_train = ['python', 'src/train_model_profiles.py', '--sites', active_sites, '--lids', selected_lids]
          forecast = ['python', 'src/forecast_profiles.py', '--sites', active_sites, '--lids', selected_lids]
          dashboard = ['python', 'src/build_standalone_dashboard.py']
          status = ['python', 'src/model_status.py', '--sites', active_sites]

          def prepare_sites():
              run(discover)
              run(thresholds)
              if active_sites != discovered:
                  run(make_active)

          if mode == 'smoke':
              run(discover)
              run(thresholds)
              run(make_active)
              run(['python', 'src/nwps_multigage_model.py', 'download', '--sites', active_sites, '--years', 1] + force_arg)
              run(train)
              run(status)
          elif mode == 'discover':
              run(discover)
          elif mode == 'thresholds':
              run(discover)
              run(thresholds)
          elif mode == 'download':
              prepare_sites()
              run(download)
              run(status)
          elif mode == 'train':
              prepare_sites()
              run(download)
              run(train)
              run(status)
          elif mode == 'run-all':
              prepare_sites()
              run(download)
              run(train)
              run(status)
          elif mode == 'profile-run':
              prepare_sites()
              run(download)
              run(profile_train)
              run(status)
          elif mode == 'profile-forecast':
              prepare_sites()
              run(download)
              run(profile_train)
              run(forecast)
              run(dashboard)
              run(status)
          elif mode == 'profile-train':
              if active_sites != discovered:
                  if not os.path.exists(discovered):
                      run(discover)
                      run(thresholds)
                  run(make_active)
              run(profile_train)
              run(status)
          elif mode == 'forecast-only':
              site_file = active_sites if os.path.exists(active_sites) else (discovered if os.path.exists(discovered) else 'config/sites.csv')
              run(['python', 'src/forecast_profiles.py', '--sites', site_file, '--lids', selected_lids])
              run(dashboard)
          elif mode == 'status':
              site_file = active_sites if os.path.exists(active_sites) else (discovered if os.path.exists(discovered) else 'config/sites.csv')
              run(['python', 'src/model_status.py', '--sites', site_file])
          else:
              raise SystemExit(f'Unknown mode: {mode}')
          PY

      - name: Publish dashboard data to GitHub Pages source
        if: ${{ inputs.mode == 'profile-forecast' || inputs.mode == 'forecast-only' }}
        run: |
          if [ ! -f docs/latest_forecasts.json ]; then
            echo "No docs/latest_forecasts.json to publish"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/latest_forecasts.json docs/forecast_dashboard.html
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit"
          else
            git commit -m "Update river forecast dashboard data"
            git push
          fi

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: river-model-output
          path: |
            config/sites_with_usgs.csv
            config/sites_active.csv
            config/model_profiles.csv
            data/processed/
            docs/
            output/
          if-no-files-found: ignore
          retention-days: 14
